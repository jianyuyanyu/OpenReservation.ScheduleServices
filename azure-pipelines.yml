trigger:
  branches:
    include:
    - 'main'  # must quote since "*" is a YAML reserved character; we want a string
  paths:
    include:
    - '*'
    exclude:
    - '**/*.md'
    - docs

pool:
  vmImage: 'ubuntu-latest'

variables:
- name: tagName
  value: "$(Build.BuildNumber)"
- name: serviceName
  value: "schedule-services"
- name: latestImageName
  value: "openreservation/$(serviceName):latest"
- name: imageName
  value: "openreservation/$(serviceName):$(tagName)"
- group: "docker"
- group: "notification"

steps:
- task: UseDotNet@2
  displayName: 'Use .NET sdk'
  inputs:
    packageType: sdk
    version: 10.0.x
    # includePreviewVersions: true

- script: |
    dotnet tool update -g dotnet-execute
    dotnet --info
    dotnet-exec info
  displayName: 'dotnet info'

- script: dotnet build -c Release
  displayName: 'dotnet build'

- script: dotnet test 
  displayName: 'dotnet test'

- script: docker build -f ./OpenReservation.ScheduleServices/Dockerfile -t $(imageName) -t $(latestImageName) .
  displayName: 'Docker build Script'

- script: |
    docker login -u $(dockerId) -p $(pswd)
    docker push $(imageName)
    docker push $(latestImageName)
  displayName: 'Push docker image'

- task: SSH@0
  displayName: 'Run shell inline on remote machine'
  inputs:
    sshEndpoint: 'weihanli-vm'
    runOptions: inline

    inline: |
      kubectl set image deployment/schedule-services schedule-services=$(imageName)

- script: |
    dotnet-exec "https://github.com/OpenReservation/scripts/blob/main/deploy/azure-pipelines-notification.cs" < /dev/null
  displayName: 'Push notification'
  env:
    # https://learn.microsoft.com/en-us/azure/devops/pipelines/process/variables?view=azure-devops&tabs=yaml%2Cbatch#secret-variables
    # can not directly reference a secret value
    DingBotWebhookUrl: $(DingBotWebhookUrl)
